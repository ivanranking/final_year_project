<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSentinel | Device Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1e60ad;
            --nav-blue: #0d47a1;
            --bg-light: #f1f6fb;
            --text-dark: #2c3e50;
            --success-green: #38b2ac;
            --danger-red: #e53e3e;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        /* --- NAVBAR --- */
        nav {
            background-color: var(--nav-blue);
            color: white;
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 20px;
        }

        .user-profile img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        /* --- MAIN CONTENT --- */
        .container {
            padding: 40px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 40px;
            position: relative;
        }

        /* Horizontal lines around the title like in the image */
        h1::before, h1::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background-color: var(--border-color);
        }
        h1::before { left: 0; }
        h1::after { right: 0; }

        /* --- ACTION BAR --- */
        .action-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .btn-outline {
            border: 1px solid var(--border-color);
            background: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-green {
            background-color: var(--success-green);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- DEVICE TABLE --- */
        .table-card {
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #f8fafc;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            padding: 15px 25px;
            text-align: left;
            font-weight: 700;
            color: #4a5568;
            font-size: 0.9rem;
        }

        td {
            padding: 18px 25px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }

        /* Status Styling */
        .status-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .status-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.6rem;
        }

        .online { color: var(--success-green); }
        .offline { color: var(--danger-red); }

        .dot-online { background-color: var(--success-green); }
        .dot-offline { background-color: var(--danger-red); }

        /* Actions menu icon */
        .menu-dots {
            color: var(--nav-blue);
            cursor: pointer;
            letter-spacing: 2px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            h1::before, h1::after { display: none; }
            .action-bar { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <i class="fas fa-eye"></i> AquaSentinel
        </div>
        <div class="nav-icons">
            <i class="fas fa-bell"></i>
            <i class="fas fa-envelope"></i>
            <i class="fas fa-comment-dots"></i>
            <div class="user-profile">
                <img src="https://i.pravatar.cc/150?u=user" alt="Profile">
                <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Device Management</h1>

        <div class="action-bar">
            <button class="btn-outline">
                <i class="fas fa-arrow-up"></i> Add Device
            </button>
            <button class="btn-green">Add Device</button>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Device ID</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Last Sync</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>DS-001</td>
                        <td>Basement</td>
                        <td>
                            <div class="status-cell online">
                                <div class="status-dot dot-online"><i class="fas fa-info"></i></div>
                                Online
                            </div>
                        </td>
                        <td>14:35:20</td>
                        <td class="menu-dots">...</td>
                    </tr>
                    <tr>
                        <td>DS-003</td>
                        <td>Kitchen</td>
                        <td>
                            <div class="status-cell offline">
                                <div class="status-dot dot-offline"><i class="fas fa-info"></i></div>
                                Offline
                            </div>
                        </td>
                        <td>12:16:45</td>
                        <td class="menu-dots">...</td>
                    </tr>
                    <tr>
                        <td>DS-002</td>
                        <td>Bastment</td> <td>
                            <div class="status-cell offline">
                                <div class="status-dot dot-offline"><i class="fas fa-info"></i></div>
                                Offline
                            </div>
                        </td>
                        <td>12:16:45</td>
                        <td class="menu-dots">...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
