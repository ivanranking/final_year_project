<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSentinel | Smart Leakage Detection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --brand-blue: #1b68c9;
            --light-blue: #3086eb;
            --accent-green: #48c78e;
            --text-dark: #2d3748;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background-color: #f9fbfd; color: var(--text-dark); }

        /* --- Hero Section with Background Waves --- */
        .hero {
            background: linear-gradient(180deg, var(--brand-blue) 0%, var(--light-blue) 100%);
            color: white;
            padding: 60px 8% 120px;
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1560457079-29a13059c0bb?auto=format&fit=crop&w=1600&q=60') center/cover no-repeat;
            opacity: 0.12;
            z-index: 0;
        }

        /* Abstract Background Waves */
        .hero::before, .hero::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }
        .hero::before { width: 500px; height: 500px; top: -100px; right: -100px; }
        .hero::after { width: 300px; height: 300px; bottom: 50px; left: -50px; }

        nav { display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 1; }
        .logo { font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; list-style: none; gap: 25px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; opacity: 0.9; }

        .hero-content { text-align: left; max-width: 540px; position: relative; z-index: 1; }
        .hero-content h1 { font-size: 3.5rem; margin-bottom: 15px; line-height: 1.1; }
        .hero-content p { font-size: 1.1rem; margin-bottom: 35px; font-weight: 300; line-height: 1.6; }

        .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; margin-top: 50px; position: relative; z-index: 1; }
        .hero-visual { display: flex; justify-content: center; }
        .hero-visual img { border-radius: 22px; box-shadow: 0 30px 50px rgba(0,0,0,0.15); max-width: 100%; height: auto; }

        .trusted { margin-top: 30px; color: rgba(255,255,255,0.85); font-size: 0.9rem; display: flex; flex-direction: column; gap: 10px; }
        .trusted span { opacity: 0.9; }
        .trusted .logos { display: flex; gap: 15px; align-items: center; }
        .trusted .logos img { width: 110px; height: auto; opacity: 0.85; filter: brightness(1.1); }

        @media (max-width: 960px) {
            .hero-grid { grid-template-columns: 1fr; gap: 35px; }
            .hero-content { text-align: center; }
            .trusted { align-items: center; }
        }

        /* Buttons matching the image style */
        .btn-container { display: flex; justify-content: center; gap: 20px; }
        .btn { padding: 12px 40px; border-radius: 50px; text-decoration: none; font-weight: 600; border: 2px solid white; transition: 0.3s; }
        .btn-white { background: white; color: var(--brand-blue); }
        .btn-green { background: var(--accent-green); border-color: var(--accent-green); color: white; }
        .btn:hover { transform: scale(1.05); filter: brightness(0.9); }

        /* --- Feature Icons Section --- */
        .features-container {
            max-width: 1000px;
            margin: -80px auto 0;
            background: white;
            padding: 40px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }
        .feature-box { text-align: center; flex: 1; }
        .feature-icon { font-size: 1.8rem; color: var(--brand-blue); margin-bottom: 15px; }
        .feature-box p { font-size: 0.85rem; font-weight: 600; color: #4a5568; }

        /* --- How It Works --- */
        .how-it-works { padding: 80px 20px; text-align: center; }
        .steps { display: flex; justify-content: center; gap: 40px; margin-top: 50px; flex-wrap: wrap; }
        .step { width: 200px; }
        .step-circle { 
            width: 120px; height: 120px; background: #eef5ff; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; border: 5px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .step-circle i { font-size: 2.5rem; color: var(--brand-blue); }
        .step p { font-weight: 700; color: var(--text-dark); }
    </style>
</head>
<body>

    {% include 'partials/hero.html' %}

    {% include 'partials/features.html' %}

    {% include 'partials/how_it_works.html' %}

</body>
</html>
