<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSentinel | Smart Leakage Detection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --brand-blue: #1b68c9;
            --light-blue: #2c7bc9;
            --accent-green: #25b4a6;
            --text-dark: #2d3748;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background-color: #f9fbfd; color: var(--text-dark); }

        /* --- Hero Section with Background Waves --- */
        .hero {
            background: linear-gradient(180deg, var(--brand-blue) 0%, var(--light-blue) 100%);
            color: white;
            padding: 60px 8% 120px;
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1560457079-29a13059c0bb?auto=format&fit=crop&w=1600&q=60') center/cover no-repeat;
            opacity: 0.12;
            z-index: 0;
        }

        /* Abstract Background Waves */
        .hero::before, .hero::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }
        .hero::before { width: 500px; height: 500px; top: -100px; right: -100px; }
        .hero::after { width: 300px; height: 300px; bottom: 50px; left: -50px; }

        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative; 
            z-index: 1; 
            padding: 0 0 20px 0;
        }
        .logo { 
            font-size: 1.5rem; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer;
            color: white;
            text-decoration: none;
        }
        .nav-links { 
            display: flex; 
            list-style: none; 
            gap: 30px; 
        }
        .nav-links a { 
            color: white; 
            text-decoration: none; 
            font-weight: 500; 
            opacity: 0.95;
            font-size: 0.95rem;
        }
        .nav-links a:hover {
            opacity: 1;
        }

        .hero-content { text-align: left; max-width: 540px; position: relative; z-index: 1; }
        .hero-content h1 { font-size: 3.5rem; margin-bottom: 15px; line-height: 1.1; }
        .hero-content p { font-size: 1.1rem; margin-bottom: 35px; font-weight: 300; line-height: 1.6; }

        .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; margin-top: 50px; position: relative; z-index: 1; }
        .hero-visual { display: flex; justify-content: center; }
        .hero-visual img { border-radius: 22px; box-shadow: 0 30px 50px rgba(0,0,0,0.15); max-width: 100%; height: auto; }

        .trusted { margin-top: 30px; color: rgba(255,255,255,0.85); font-size: 0.9rem; display: flex; flex-direction: column; gap: 10px; }
        .trusted span { opacity: 0.9; }
        .trusted .logos { display: flex; gap: 15px; align-items: center; }
        .trusted .logos img { width: 110px; height: auto; opacity: 0.85; filter: brightness(1.1); }

        @media (max-width: 960px) {
            .hero-grid { grid-template-columns: 1fr; gap: 35px; }
            .hero-content { text-align: center; }
            .trusted { align-items: center; }
        }

        /* Buttons matching the image style */
        .btn-container { 
            display: flex; 
            justify-content: flex-start; 
            gap: 18px;
            flex-wrap: wrap;
        }
        .btn { 
            padding: 13px 35px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 600; 
            border: 2px solid white; 
            transition: all 0.3s ease;
            font-size: 0.95rem;
            display: inline-block;
        }
        .btn-white { 
            background: white; 
            color: var(--brand-blue);
            border-color: white;
        }
        .btn-white:hover { 
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
        }
        .btn-green { 
            background: var(--accent-green); 
            border-color: var(--accent-green); 
            color: white; 
        }
        .btn-green:hover { 
            background: #229186;
            border-color: #229186;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0px);
        }

        /* --- Feature Icons Section --- */
        .features-container {
            max-width: 1200px;
            margin: -80px auto 0;
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }
        .feature-box { 
            text-align: center; 
            padding: 10px;
        }
        .feature-icon { 
            font-size: 2.2rem; 
            color: var(--brand-blue); 
            margin-bottom: 15px; 
        }
        .feature-box h3 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2d3748;
        }
        .feature-box p { 
            font-size: 0.8rem; 
            font-weight: 500;
            color: #718096; 
        }

        /* --- How It Works --- */
        .how-it-works { padding: 80px 20px; text-align: center; }
        .steps { display: flex; justify-content: center; gap: 40px; margin-top: 50px; flex-wrap: wrap; }
        .step { width: 200px; }
        .step-circle { 
            width: 120px; height: 120px; background: #eef5ff; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; border: 5px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .step-circle i { font-size: 2.5rem; color: var(--brand-blue); }
        .step p { font-weight: 700; color: var(--text-dark); }

        /* --- Team Section --- */
        .team-section {
            padding: 80px 20px;
            background: white;
            text-align: center;
        }

        .section-header {
            max-width: 600px;
            margin: 0 auto 60px;
        }

        .section-header h2 {
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .section-header p {
            font-size: 1.1rem;
            color: #718096;
            line-height: 1.6;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .team-member {
            background: #f8fafc;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .team-member:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }

        .member-avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--brand-blue), var(--light-blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(27, 104, 201, 0.3);
        }

        .member-avatar i {
            font-size: 3rem;
            color: white;
        }

        .team-member h3 {
            font-size: 1.4rem;
            color: var(--text-dark);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .member-role {
            color: var(--brand-blue);
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .member-bio {
            color: #718096;
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .member-social {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-link {
            width: 40px;
            height: 40px;
            background: var(--brand-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: var(--light-blue);
            transform: translateY(-2px);
        }

        .social-link i {
            font-size: 1.1rem;
        }

        /* --- Footer Section --- */
        .footer {
            background: var(--text-dark);
            color: white;
            padding: 60px 20px 20px;
            margin-top: 80px;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
        }

        .footer-section h4 {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .footer-logo h3 {
            color: var(--brand-blue);
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .footer-logo p {
            color: #a0aec0;
            line-height: 1.6;
            margin: 0;
        }

        .footer-section ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .footer-section ul li {
            margin-bottom: 10px;
        }

        .footer-section ul li a {
            color: #a0aec0;
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 0.95rem;
        }

        .footer-section ul li a:hover {
            color: var(--brand-blue);
        }

        .social-links {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .footer .social-link {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .footer .social-link:hover {
            background: var(--brand-blue);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(27, 104, 201, 0.3);
        }

        .contact-info p {
            color: #a0aec0;
            margin: 8px 0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .contact-info i {
            color: var(--brand-blue);
            width: 16px;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .footer-bottom-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-bottom p {
            color: #a0aec0;
            margin: 0;
            font-size: 0.9rem;
        }

        .footer-bottom-links {
            display: flex;
            gap: 20px;
        }

        .footer-bottom-links a {
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .footer-bottom-links a:hover {
            color: var(--brand-blue);
        }

        @media (max-width: 768px) {
            .footer-content {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 30px;
            }

            .footer-bottom-content {
                flex-direction: column;
                text-align: center;
            }

            .social-links {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    {% include 'partials/hero.html' %}

    {% include 'partials/features.html' %}

    {% include 'partials/how_it_works.html' %}

    {% include 'partials/team.html' %}

    {% include 'partials/footer.html' %}

</body>
</html>
