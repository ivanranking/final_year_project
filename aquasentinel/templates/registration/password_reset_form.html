<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset | AquaSentinel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f6fb; color: #2c3e50; }
        .container { max-width: 420px; margin: 80px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.07); }
        h1 { margin-bottom: 18px; font-size: 1.7rem; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #1e60ad; color: white; font-weight: 700; cursor: pointer; }
        button:hover { background: #164da1; }
        .messages { margin-bottom: 16px; }
        .messages div { padding: 10px; border-radius: 6px; margin-bottom: 8px; }
        .messages .error { background: #fee2e2; color: #b91c1c; }
        .messages .success { background: #d1fae5; color: #065f46; }
        .nav { margin-bottom: 16px; }
        .nav a { color: #1e60ad; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav"><a href="{% url 'login' %}">&larr; Back to login</a></div>
        <h1>Reset your password</h1>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <p>Enter your email address and we'll send you a link to reset your password.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.email }}
            <button type="submit">Send password reset email</button>
        </form>
    </div>
</body>
</html>
