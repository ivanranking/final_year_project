<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set new password | AquaSentinel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f6fb; color: #2c3e50; }
        .container { max-width: 420px; margin: 80px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.07); }
        h1 { margin-bottom: 18px; font-size: 1.7rem; }
        .form-group { margin-bottom: 18px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #1e60ad; color: white; font-weight: 700; cursor: pointer; }
        button:hover { background: #164da1; }
        .nav { margin-top: 16px; }
        .nav a { color: #1e60ad; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Set a new password</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.new_password1 }}
            {{ form.new_password2 }}
            <button type="submit">Reset password</button>
        </form>

        <div class="nav">
            <a href="{% url 'login' %}">&larr; Back to login</a>
        </div>
    </div>
</body>
</html>
